<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; justify-content: center; padding: 2rem 1rem; }

  h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 1.25rem; text-align: center; }
  .tab-row { display: flex; margin-bottom: 1.5rem; border: 1px solid #e0e0d8; border-radius: 10px; overflow: hidden; }
  .tab-btn { flex: 1; padding: 0.7rem; font-size: 13px; font-weight: 600; background: #fff; color: #888; border: none; cursor: pointer; transition: background 0.15s, color 0.15s; }
  .tab-btn.active { background: #1a1a1a; color: #fff; }
  .tab-btn:not(.active):hover { background: #f0f0ea; }

  .tab-content.active { display: block; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
  .stat-card { background: #fff; border: 1px solid #e0e0d8; border-radius: 10px; padding: 0.75rem 1rem; }

  .box-btn { width: 100%; padding: 1rem; font-size: 18px; font-weight: 600; color: #fff; border: none; border-radius: 12px; cursor: pointer; transition: background 0.15s, transform 0.1s; }

  .box-btn.ten { background: #3a3a8a; } .box-btn.ten:hover { background: #4a4aaa; }
  .box-btn:active { transform: scale(0.97); }
  .special-counter { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
  .counter-badge { background: #fff; border: 1px solid #e0e0d8; border-radius: 8px; padding: 5px 10px; font-size: 11px; color: #888; display: flex; align-items: center; gap: 5px; }
  .counter-badge .badge-name { color: #555; font-weight: 600; }
  .counter-badge .badge-count { color: #b8860b; font-weight: 700; font-size: 13px; }
  .special-notice { background: #fff8e1; border: 1px solid #ffe082; border-radius: 10px; padding: 0.75rem 1rem; margin-bottom: 1rem; display: none; }
  .special-notice .special-title { font-size: 13px; font-weight: 600; color: #b8860b; margin-bottom: 4px; }
  .special-notice .special-body { font-size: 13px; color: #7a5c00; }
  .pickup-notice { background: #fde8ff; border: 1px solid #e8a0ff; border-radius: 10px; padding: 0.75rem 1rem; margin-bottom: 1rem; display: none; }
  .pickup-notice .pickup-title { font-size: 13px; font-weight: 600; color: #7a00aa; margin-bottom: 4px; }
  .pickup-notice .pickup-body { font-size: 13px; color: #5a0080; }
  .result-area { min-height: 80px; max-height: 300px; overflow-y: auto; background: #fff; border: 1px solid #e0e0d8; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; display: flex; flex-direction: column; justify-content: center; gap: 6px; }
  .result-item-name { font-size: 18px; font-weight: 600; color: #1a1a1a; }
  .result-prob { font-size: 12px; color: #aaa; margin-top: 2px; }
  .result-item-qty { font-size: 13px; color: #666; margin-top: 3px; }
  .result-empty { font-size: 14px; color: #bbb; }
  .history-title { font-size: 13px; color: #888; margin-bottom: 8px; font-weight: 600; }
  .history-list { display: flex; flex-direction: column; max-height: 220px; overflow-y: auto; background: #fff; border: 1px solid #e0e0d8; border-radius: 10px; }
  .history-item { font-size: 13px; color: #555; padding: 8px 12px; border-bottom: 1px solid #f0f0ea; display: flex; justify-content: space-between; }
  .history-item:last-child { border-bottom: none; }
  .history-item .num { color: #bbb; margin-right: 6px; }
  .reset-btn { margin-top: 1rem; font-size: 13px; color: #888; background: none; border: 1px solid #ddd; border-radius: 8px; padding: 6px 14px; cursor: pointer; }

  .toggle-label { font-size: 13px; color: #555; font-weight: 600; }
  .toggle-wrap { display: flex; background: #f0f0ea; border-radius: 8px; overflow: hidden; border: 1px solid #e0e0d8; }

  .mode-badge.pickup { background: #fde8ff; color: #7a00aa; }
  .mode-badge.normal { background: #e8f0ff; color: #1a3a8a; }

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active',

  document.getElementById('tab-box').classList.toggle('active', tab==='box');
  document.getElementById('tab-pickup').classList.toggle('active', tab==='pickup');
  document.getElementById('tab-guild').classList.toggle('active', tab==='guild');
  document.getElementById('tab-spirit').classList.toggle('active', tab==='spirit');
}

const bTP = ITEMS.reduce((s,i)=>s+i.prob,0);
let bCnt=0, bHist=[];
const bSC = {"블라드":0,"마누스":0,"마누스 장식":0,"커스리퍼":0};
function bRoll(){let r=Math.random()*bTP,c=0,item=ITEMS[ITEMS.length-1];for(let i of ITEMS){c+=i.prob;if(r<=c){item=i;break;}}return item;}
function bStats(){document.getElementById('b-count').textContent=bCnt+'회';document.getElementById('b-cost').textContent=(Math.floor(bCnt/10)*12000).toLocaleString()+'원';}
function bCounter(){const el=document.getElementById('b-special-counter');const has=Object.values(bSC).some(v=>v>0);if(!has){el.style.display='none';return;}el.style.display='flex';el.innerHTML=Object.entries(bSC).map(([n,c])=>`<div class="counter-badge"><span class="badge-name">${n}</span><span style="color:#bbb;font-size:11px;">총</span><span class="badge-count">${c}회</span></div>`).join('');}
function bSpecial(sp){const el=document.getElementById('b-special-notice');sp.forEach(s=>{if(s.name in bSC)bSC[s.name]++;});bCounter();if(!sp.length){el.style.display='none';return;}el.style.display='block';document.getElementById('b-special-body').innerHTML=sp.map(s=>`<b>${s.name}</b> — ${s.no}번째 뽑기에서 획득!`).join('<br>');}
function bDrawOne(){const item=bRoll();bCnt++;bStats();const ra=document.getElementById('b-result-area');ra.style.justifyContent='center';ra.innerHTML=`<div class="result-item-name">${item.name}</div><div class="result-item-qty">수량: ${item.qty}개</div><div class="result-prob">확률: ${item.prob.toFixed(4)}%</div>`;const sp=[];if(item.special)sp.push({name:item.name,no:bCnt});bSpecial(sp);bHist.unshift({name:item.name,qty:item.qty,no:bCnt});if(bHist.length>50)bHist.pop();bRH();}
function bDrawTen(){const res=[],sp=[];for(let i=0;i<10;i++){const item=bRoll();bCnt++;if(item.special)sp.push({name:item.name,no:bCnt});res.push({item,no:bCnt});bHist.unshift({name:item.name,qty:item.qty,no:bCnt});if(bHist.length>50)bHist.pop();}bStats();bSpecial(sp);const ra=document.getElementById('b-result-area');ra.style.justifyContent='flex-start';ra.innerHTML=res.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #f0f0ea;"><span style="font-size:14px;font-weight:${r.item.special?'700':'400'};color:${r.item.special?'#b8860b':'#1a1a1a'}">${r.item.special?'✨ ':''}${r.item.name}</span><span style="font-size:12px;color:#aaa">${r.item.qty}개</span></div>`).join('');bRH();}
function bRH(){document.getElementById('b-history').innerHTML=bHist.map(h=>`<div class="history-item"><span><span class="num">#${h.no}</span>${h.name}</span><span>${h.qty}개</span></div>`).join('');}
function bReset(){bCnt=0;bHist=[];Object.keys(bSC).forEach(k=>bSC[k]=0);document.getElementById('b-count').textContent='0회';document.getElementById('b-cost').textContent='0원';document.getElementById('b-result-area').innerHTML='<span class="result-empty">상자를 눌러 아이템을 뽑아보세요</span>';document.getElementById('b-result-area').style.justifyContent='center';document.getElementById('b-history').innerHTML='';document.getElementById('b-special-notice').style.display='none';document.getElementById('b-special-counter').style.display='none';}

function setMode(m) {

  else { badge.textContent='일반 뽑기'; badge.className='mode-badge normal'; }
  pReset();
}

const pTP_pickup = PICKUP.reduce((s,i)=>s+i.prob,0);
const pTP_normal = NORMAL.reduce((s,i)=>s+i.prob,0);
let pCnt=0, pHist=[];

function pColor(g){return g==='ss'?'#7c3aed':g==='s'?'#1d6fd4':g==='pickup'?'#b8860b':'#1a1a1a';}
function pLabel(g){
  if(g==='pickup') return ' [P]';
  if(g==='ss') return ' [SS]';
  if(g==='s') return ' [S]';
  return '';
}
function pRoll(){
  const pool = pMode==='pickup' ? PICKUP : NORMAL;
  const tp = pMode==='pickup' ? pTP_pickup : pTP_normal;
  let r=Math.random()*tp,c=0,item=pool[pool.length-1];
  for(let i of pool){c+=i.prob;if(r<=c){item=i;break;}}
  return item;
}
function pStats(){document.getElementById('p-count').textContent=pCnt+'회';document.getElementById('p-cost').textContent=(pCnt*100).toLocaleString()+'개';}
function pHandleResults(results){
  const ssItems = results.filter(r=>r.item.grade==='ss');
  const pickupItems = results.filter(r=>r.item.grade==='pickup');
  const snotice = document.getElementById('p-special-notice');
  if(ssItems.length){
    snotice.style.display='block';
    document.getElementById('p-special-body').innerHTML = ssItems.map(r=>`<b>${r.item.name}</b> — ${r.no}번째 뽑기에서 획득!`).join('<br>');
  } else { snotice.style.display='none'; }
  const pnotice = document.getElementById('p-pickup-notice');
  if(pickupItems.length){
    pnotice.style.display='block';
    document.getElementById('p-pickup-body').innerHTML = pickupItems.map(r=>`<b>${r.item.name}</b> — ${r.no}번째 뽑기에서 픽업 획득!`).join('<br>');
  } else { pnotice.style.display='none'; }
}
function pDrawOne(){
  const item=pRoll();pCnt++;pStats();
  const ra=document.getElementById('p-result-area');
  ra.style.justifyContent='center';
  ra.innerHTML=`<div class="result-item-name" style="color:${pColor(item.grade)}">${item.name}${pLabel(item.grade)}</div><div class="result-prob">확률: ${item.prob.toFixed(5)}%</div>`;
  pHandleResults([{item,no:pCnt}]);
  pHist.unshift({name:item.name,grade:item.grade,no:pCnt});
  if(pHist.length>50)pHist.pop();pRH();
}
function pDrawTen(){
  const res=[];
  for(let i=0;i<10;i++){
    const item=pRoll();pCnt++;
    res.push({item,no:pCnt});
    pHist.unshift({name:item.name,grade:item.grade,no:pCnt});
    if(pHist.length>50)pHist.pop();
  }
  pStats();pHandleResults(res);
  const ra=document.getElementById('p-result-area');
  ra.style.justifyContent='flex-start';
  ra.innerHTML=res.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #f0f0ea;">
    <span style="font-size:14px;color:${pColor(r.item.grade)};font-weight:${r.item.grade!=='n'?'700':'400'}">${r.item.name}${pLabel(r.item.grade)}</span>
    <span style="font-size:11px;color:#bbb">${r.item.prob.toFixed(5)}%</span>
  </div>`).join('');
  pRH();
}
function pRH(){document.getElementById('p-history').innerHTML=pHist.map(h=>`<div class="history-item"><span><span class="num">#${h.no}</span><span style="color:${pColor(h.grade)}">${h.name}${pLabel(h.grade)}</span></span></div>`).join('');}
function pReset(){
  pCnt=0;pHist=[];
  document.getElementById('p-count').textContent='0회';
  document.getElementById('p-cost').textContent='0개';
  document.getElementById('p-result-area').innerHTML='<span class="result-empty">뽑기 버튼을 눌러보세요</span>';
  document.getElementById('p-result-area').style.justifyContent='center';
  document.getElementById('p-history').innerHTML='';
  document.getElementById('p-special-notice').style.display='none';
  document.getElementById('p-pickup-notice').style.display='none';
}

  }
  gStats();gSpecial(sp);
  const ra=document.getElementById('g-result-area');
  ra.style.justifyContent='flex-start';
  ra.innerHTML=res.map(r=>{
    const showQty = !r.item.name.match(/\d+개$/);
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #f0f0ea;">
      <span style="font-size:14px;font-weight:${r.item.special?'700':'400'};color:${r.item.special?'#b8860b':'#1a1a1a'}">${r.item.special?'✨ ':''}${r.item.name}</span>
      ${showQty?`<span style="font-size:12px;color:#aaa">${r.item.qty}개</span>`:''}
    </div>`;
  }).join('');
  gRH();
}
function gRH(){document.getElementById('g-history').innerHTML=gHist.map(h=>{
  const showQty = !h.name.match(/\d+개$/);
  return `<div class="history-item"><span><span class="num">#${h.no}</span><span style="color:${h.special?'#b8860b':'#555'}">${h.name}</span></span>${showQty?`<span>${h.qty}개</span>`:''}</div>`;
}).join('');}
function gReset(){
  gCnt=0;gHist=[];Object.keys(gSC).forEach(k=>gSC[k]=0);
  document.getElementById('g-count').textContent='0회';
  document.getElementById('g-cost').textContent='0개';
  document.getElementById('g-result-area').innerHTML='<span class="result-empty">뽑기 버튼을 눌러보세요</span>';
  document.getElementById('g-result-area').style.justifyContent='center';
  document.getElementById('g-history').innerHTML='';
  document.getElementById('g-special-notice').style.display='none';
  document.getElementById('g-special-counter').style.display='none';
}

/* ===== 탭4: 정령 뽑기 ===== */
const SPIRITS_4 = [
  {name:"노비크",attr:"땅"},{name:"샐리건",attr:"불"},{name:"에르단",attr:"물"},
  {name:"실라게트",attr:"바람"},{name:"아라칸",attr:"어둠"},{name:"일레니아",attr:"빛"}
];
const SPIRITS_5 = [
  {name:"노드슈렌",attr:"땅"},{name:"노드카이저",attr:"땅"},{name:"노다이나",attr:"땅"},
  {name:"이그니토",attr:"불"},{name:"샐레이드",attr:"불"},{name:"이프릭션",attr:"불"},
  {name:"에시오닉",attr:"물"},{name:"엘시오드",attr:"물"},{name:"엘로네스",attr:"물"},
  {name:"시르케온",attr:"바람"},{name:"시라이자",attr:"바람"},{name:"실리바인",attr:"바람"},
  {name:"세미온",attr:"어둠"},{name:"스피리온",attr:"어둠"},{name:"아카이랄",attr:"어둠"},
  {name:"이오닉스",attr:"빛"},{name:"이스틴",attr:"빛"},{name:"일슈타인",attr:"빛"}
];
const SPIRITS_6 = [
  {name:"노에스",attr:"땅",bonus:"체력 +40"},{name:"노에아넨",attr:"땅",bonus:"공격 +10"},{name:"노아스",attr:"땅",bonus:"방어 +10"},
  {name:"이그니스",attr:"불",bonus:"체력 +40"},{name:"샐리맨더",attr:"불",bonus:"공격 +10"},{name:"이프리트",attr:"불",bonus:"방어 +10"},
  {name:"엔다이론",attr:"물",bonus:"체력 +40"},{name:"엘레스트라",attr:"물",bonus:"공격 +10"},{name:"엘람임",attr:"물",bonus:"방어 +10"},
  {name:"실라이튼",attr:"바람",bonus:"체력 +40"},{name:"실레스틴",attr:"바람",bonus:"공격 +10"},{name:"실피드",attr:"바람",bonus:"방어 +10"},
  {name:"세이드",attr:"어둠",bonus:"체력 +40"},{name:"스프라이트",attr:"어둠",bonus:"공격 +10"},{name:"아르카네",attr:"어둠",bonus:"방어 +10"},
  {name:"잭오랜턴",attr:"빛",bonus:"체력 +40"},{name:"위스프",attr:"빛",bonus:"공격 +10"},{name:"이시리스",attr:"빛",bonus:"방어 +10"}
];

const ATTR_ICON = {땅:"🟤",불:"🔴",물:"🔵",바람:"🟢",어둠:"🟣",빛:"🟡"};
const ATTR_COLOR = {땅:"#8B6914",불:"#cc3300",물:"#0066cc",바람:"#009966",어둠:"#6600cc",빛:"#cc9900"};

// 옵션 쌍: [%값, +값]
const OPT_PAIRS_4 = [["10%",21],["14%",27]];
const OPT_PAIRS_5 = [["10%",21],["14%",27],["18%",33]];
const OPT_PAIRS_6 = [["10%",21],["14%",27],["18%",33],["22%",52]];
const OPT_TYPES = ["공격","방어","체력"];
const OPT_CLASS = {공격:"atk",방어:"def",체력:"hp"};
const OPT_ICON  = {공격:"⚔️",방어:"🛡️",체력:"❤️"};

let sCnt=0, sHist=[], sCost=0;
let sGradeCnt={4:0,5:0,6:0};
let sMode='off';

function setSMode(m){
  if(sMode===m) return;
  sMode=m;
  document.getElementById('toggle-s-off').classList.toggle('active', m==='off');
  document.getElementById('toggle-s-on').classList.toggle('active', m==='on');
  const badge=document.getElementById('s-mode-badge');
  if(m==='on'){badge.textContent='확률업 ON';badge.className='mode-badge pickup';}
  else{badge.textContent='기본 확률';badge.className='mode-badge normal';}
  sReset();
}

function sUpdateGrade(grade){
  sGradeCnt[grade]++;
  document.getElementById('s-cnt4').textContent=sGradeCnt[4];
  document.getElementById('s-cnt5').textContent=sGradeCnt[5];
  document.getElementById('s-cnt6').textContent=sGradeCnt[6];
}

function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}

function rollSpirit(){
  const r=Math.random()*100;
  let grade, pool;
  const thresh4 = sMode==='on' ? 77 : 80;
  if(r<thresh4){grade=4;pool=SPIRITS_4;}
  else if(r<95){grade=5;pool=SPIRITS_5;}
  else{grade=6;pool=SPIRITS_6;}
  const spirit={...rnd(pool), grade};
  const pairs = grade===4?OPT_PAIRS_4:grade===5?OPT_PAIRS_5:OPT_PAIRS_6;
  spirit.options = pairs.map(pair=>{
    const val = Math.random()<0.5 ? pair[0] : pair[1];
    const type = rnd(OPT_TYPES);
    return {type, val};
  });
  return spirit;
}

function starStr(g){return '⭐'.repeat(g);}
function gradeClass(g){return g===6?'grade-6':g===5?'grade-5':'grade-4';}

function renderSpiritCard(s, idx){
  return `<div class="spirit-card ${gradeClass(s.grade)}" onclick="openModal(${idx})">
    <div class="s-stars">${starStr(s.grade)}</div>
    <div class="s-icon">${ATTR_ICON[s.attr]||'✨'}</div>
    <div class="s-name">${s.name}</div>
  </div>`;
}

let sLastResults = [];
const sSC = {"극막":[],"막플":[]};

function sCheckSpecial(s, no){
  if(s.grade!==6) return null;
  const vals=s.options.map(o=>String(o.val));
  const isPct=v=>v.includes('%');
  // 극막: %%%+ 순서 + 앞 3개 옵션에 공격/방어/체력 각 1개씩
  const isGeukmak = isPct(vals[0])&&isPct(vals[1])&&isPct(vals[2])&&!isPct(vals[3]) &&
    ['공격','방어','체력'].every(t=>s.options.slice(0,3).map(o=>o.type).includes(t));
  // 막플: %%%+ 순서 (타입 무관)
  const isMakpl = isPct(vals[0])&&isPct(vals[1])&&isPct(vals[2])&&!isPct(vals[3]);
  if(isGeukmak) return '극막';
  if(isMakpl) return '막플';
  return null;
}

function sSCCounter(){
  const el=document.getElementById('s-special-counter');
  const has=sSC['극막'].length>0||sSC['막플'].length>0;
  if(!has){el.style.display='none';return;}
  el.style.display='flex';
  el.innerHTML=['극막','막플'].map(k=>{
    if(!sSC[k].length) return '';
    return `<div class="counter-badge"><span class="badge-name">${k==='극막'?'⚡ 극막':'🛡️ 막플'}</span><span style="color:#bbb;font-size:11px;">총</span><span class="badge-count">${sSC[k].length}회</span></div>`;
  }).join('');
}

function sDrawOne(){
  const s=rollSpirit(); sCnt++; sCost+=100;
  s.no=sCnt;
  sUpdateGrade(s.grade);
  const type=sCheckSpecial(s,sCnt);
  if(type) sSC[type].push({name:s.name,no:sCnt});
  sSCCounter();
  sLastResults=[s];
  sUpdateStats();
  document.getElementById('s-result-area').style.display='none';
  const grid=document.getElementById('s-result-grid');
  grid.style.display='block';
  grid.innerHTML=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">${renderSpiritCard(s,0)}</div>`;
  sHist.unshift({name:s.name,grade:s.grade,attr:s.attr,no:sCnt});
  if(sHist.length>50)sHist.pop();
  sRH();
}

function sDrawTen(){
  const results=[];
  let localCnt=sCnt;
  for(let i=0;i<11;i++){
    const s=rollSpirit(); sCnt++;
    s.no=sCnt;
    sUpdateGrade(s.grade);
    const type=sCheckSpecial(s,sCnt);
    if(type) sSC[type].push({name:s.name,no:sCnt});
    results.push(s);
    sHist.unshift({name:s.name,grade:s.grade,attr:s.attr,no:sCnt});
    if(sHist.length>50)sHist.pop();
  }
  sCost+=1000;
  sSCCounter();
  sLastResults=results;
  sUpdateStats();
  document.getElementById('s-result-area').style.display='none';
  const grid=document.getElementById('s-result-grid');
  grid.style.display='block';
  grid.innerHTML=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">${results.map((s,i)=>renderSpiritCard(s,i)).join('')}</div>`;
  sRH();
}

function sUpdateStats(){
  document.getElementById('s-count').textContent=sCnt+'회';
  document.getElementById('s-cost').textContent=sCost.toLocaleString()+'개';
}

function openModal(idx){
  const s=sLastResults[idx];
  if(!s)return;
  document.getElementById('modal-stars').textContent=starStr(s.grade);
  const ic=document.getElementById('modal-icon');
  ic.textContent=ATTR_ICON[s.attr]||'✨';
  ic.style.background=s.grade===6?'#ffe066':s.grade===5?'#b0e8e0':'#d0d0c8';
  ic.style.border=`2px solid ${ATTR_COLOR[s.attr]||'#aaa'}`;
  document.getElementById('modal-name').textContent=s.name;
  document.getElementById('modal-bonus').textContent=s.bonus ? '부가옵 '+s.bonus : '';

  const sNotice=document.getElementById('s-special-notice');
  const sTitle=document.getElementById('s-special-title');
  const sBody=document.getElementById('s-special-body');
  const type=sCheckSpecial(s,s.no);
  let badge='';
  if(type==='극막'){
    const cnt=sSC['극막'].length;
    badge='<div style="margin:6px auto 8px;display:inline-block;background:#ff4400;color:#fff;font-size:13px;font-weight:700;padding:4px 14px;border-radius:20px;">⚡ 극막</div>';
    sNotice.style.cssText='display:block;background:#fff0e8;border:1px solid #ff6633;border-radius:10px;padding:0.75rem 1rem;margin-bottom:1rem;';
    sTitle.style.color='#cc2200'; sTitle.textContent='⚡ 극막 획득!';
    sBody.innerHTML=`<b>${s.name}</b> — ${s.no}번째 뽑기에서 획득! (누적 ${cnt}회)`;
  } else if(type==='막플'){
    const cnt=sSC['막플'].length;
    badge='<div style="margin:6px auto 8px;display:inline-block;background:#0055cc;color:#fff;font-size:13px;font-weight:700;padding:4px 14px;border-radius:20px;">🛡️ 막플</div>';
    sNotice.style.cssText='display:block;background:#e8f0ff;border:1px solid #4488ff;border-radius:10px;padding:0.75rem 1rem;margin-bottom:1rem;';
    sTitle.style.color='#0044aa'; sTitle.textContent='🛡️ 막플 획득!';
    sBody.innerHTML=`<b>${s.name}</b> — ${s.no}번째 뽑기에서 획득! (누적 ${cnt}회)`;
  } else {
    sNotice.style.display='none';
  }
  document.getElementById('modal-badge').innerHTML=badge;
  document.getElementById('modal-options').innerHTML=s.options.map(o=>
    `<div class="opt-pill ${OPT_CLASS[o.type]}">${OPT_ICON[o.type]} ${o.type} ${o.val}</div>`
  ).join('');
  document.getElementById('spirit-modal').style.display='flex';
}

function closeModal(){
  document.getElementById('spirit-modal').style.display='none';
}

function sRH(){
  document.getElementById('s-history').innerHTML=sHist.map(h=>`
    <div class="history-item">
      <span><span class="num">#${sHist.indexOf(h)+1}</span>${ATTR_ICON[h.attr]} ${h.name}</span>
      <span style="font-size:11px;color:${h.grade===6?'#cc9900':h.grade===5?'#009988':'#888'}">${starStr(h.grade)}</span>
    </div>`).join('');
}

function sReset(){
  sCnt=0; sCost=0; sHist=[]; sLastResults=[];
  sGradeCnt={4:0,5:0,6:0};
  sSC['극막']=[]; sSC['막플']=[];
  document.getElementById('s-count').textContent='0회';
  document.getElementById('s-cost').textContent='0개';
  document.getElementById('s-cnt4').textContent='0';
  document.getElementById('s-cnt5').textContent='0';
  document.getElementById('s-cnt6').textContent='0';
  document.getElementById('s-result-grid').style.display='none';
  document.getElementById('s-result-area').style.display='flex';
  document.getElementById('s-result-area').innerHTML='<span class="result-empty">뽑기 버튼을 눌러보세요</span>';
  document.getElementById('s-history').innerHTML='';
  document.getElementById('s-special-notice').style.display='none';
  document.getElementById('s-special-counter').style.display='none';
}
</script>
</body>
